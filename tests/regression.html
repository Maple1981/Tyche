<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tyche regression smoke tests</title>
    <style>
      body {
        margin: 0;
        font: 16px/1.5 Georgia, serif;
        color: #17233a;
        background: #f7f8fa;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }

      iframe {
        width: 100%;
        height: 520px;
        border: 1px solid #c8d3e1;
        background: #fff;
      }

      li.pass {
        color: #0f6b3d;
      }

      li.fail {
        color: #9f1d2d;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tyche regression smoke tests</h1>
      <ol id="results"></ol>
      <iframe id="appFrame"></iframe>
    </main>
    <script>
      const results = document.querySelector("#results");
      const frame = document.querySelector("#appFrame");
      const version = new URLSearchParams(location.search).get("v") || "dev";
      let resultCount = 0;
      let failureCount = 0;

      function record(label, passed) {
        const item = document.createElement("li");
        item.className = passed ? "pass" : "fail";
        item.textContent = `${passed ? "PASS" : "FAIL"}: ${label}`;
        results.append(item);
        resultCount += 1;
        if (!passed) failureCount += 1;
      }

      function finish() {
        window.__TYCHE_REGRESSION_DONE__ = {
          resultCount,
          failureCount,
        };
        window.dispatchEvent(new CustomEvent("tyche:regression-complete", {
          detail: window.__TYCHE_REGRESSION_DONE__,
        }));
      }

      function waitFor(predicate, label, timeout = 4000) {
        const started = performance.now();
        return new Promise((resolve, reject) => {
          const tick = () => {
            try {
              if (predicate()) {
                resolve(true);
                return;
              }
            } catch {
              // Retry until timeout.
            }
            if (performance.now() - started > timeout) {
              reject(new Error(`Timed out waiting for ${label}`));
              return;
            }
            window.setTimeout(tick, 40);
          };
          tick();
        });
      }

      function assert(label, condition) {
        record(label, Boolean(condition));
      }

      function waitForChartResult(win) {
        return Promise.race([
          new Promise((resolve) => {
            win.addEventListener("tyche:chart-rendered", resolve, { once: true });
          }),
          new Promise((_, reject) => {
            win.addEventListener("tyche:chart-error", (event) => {
              reject(new Error(event.detail?.message || "chart error"));
            }, { once: true });
          }),
        ]);
      }

      async function run() {
        const doc = frame.contentDocument;
        const win = frame.contentWindow;
        await waitFor(() => win.__TYCHE_READY__ && win.TycheTest, "Tyche test API");

        const $ = (selector) => doc.querySelector(selector);
        const $$ = (selector) => Array.from(doc.querySelectorAll(selector));
        const testApi = win.TycheTest;
        assert("TycheTest queda congelado en modo regresion", Object.isFrozen(testApi));
        assert("TycheTest expone version de esquema esperada", testApi.schemaVersion === 2);
        assert("TycheTest expone build hash efectivo", testApi.buildHash === version);

        $("#birthDate").value = "1980-01-01";
        $("#birthTime").value = "12:00";
        $("#birthPlace").value = "Regression Test";
        $("#latitude").value = "40.4168";
        $("#longitude").value = "-3.7038";
        $("#timeZone").value = "Europe/Madrid";
        $("#manualOffset").value = "+01:00";

        $$('input[name="lots"]').forEach((item) => {
          item.checked = false;
        });

        const chartRendered = waitForChartResult(win);
        $("#chart-form").dispatchEvent(new win.Event("submit", { bubbles: true, cancelable: true }));
        await chartRendered;

        assert("Fortuna y Espiritu siguen auditables aunque se oculten en la tabla", $("[data-test='main-lots-audit']") && $("[data-test='main-lot-fortune']") && $("[data-test='main-lot-spirit']"));
        assert("La base tecnica queda subdividida en score, lotes y evidencias", $("[data-test='evidence-score']") && $("[data-test='evidence-main-lots']") && $("[data-test='evidence-general']"));
        assert("Los lotes principales resaltan administracion directa", $("[data-test='main-lot-fortune-direct-administration']") && $("[data-test='main-lot-spirit-direct-administration']"));

        $("#techniqueMode").value = "strict";
        $("#includeModern").checked = true;
        $("#includeModern").dispatchEvent(new win.Event("change", { bubbles: true }));
        await waitFor(() => $("[data-test='modern-strict-warning']:not([hidden])"), "modern strict warning");
        assert("Modernos visibles en modo tradicional muestran aviso inmediato", $("[data-test='modern-strict-warning']:not([hidden])"));

        // 2 Aries = termino de Jupiter en los terminos egipcios.
        const ownBound = testApi.dignityGroups(testApi.dignityFor("jupiter", 2, true));
        assert("Planeta en termino propio cuenta como dignidad menor propia", ownBound.minor.length > 0);

        // 2 Aries sigue siendo termino de Jupiter, no de Saturno.
        const foreignBound = testApi.dignityGroups(testApi.dignityFor("saturn", 2, true));
        assert("Planeta en termino ajeno queda como administracion, no apoyo propio", foreignBound.administration.length > 0 && foreignBound.minor.length === 0);

        const boundOnlyReception = {
          hasReception: true,
          strongest: 2,
          effectiveScore: 2,
          targetReceivesActor: { kinds: ["bound"] },
          actorReceivesTarget: { kinds: [] },
        };
        assert("Recepcion solo por termino no rebaja presion fuerte", testApi.adjustIntensityForReception("highLevel", "tension", boundOnlyReception) === "highLevel");

        const chart = testApi.calculateChart({ selectedLots: [] });
        assert("Fortuna y Espiritu se calculan internamente aunque selectedLots este vacio", testApi.lotByKey(chart, "fortune") && testApi.lotByKey(chart, "spirit"));
        const scoreItems = testApi.scoreChartTopics(chart).flatMap((focus) => focus.scoreItems || []);
        assert("El regente de casa 10 pesa como testimonio publico moderado", scoreItems.some((item) => item.reasonCode && item.reasonCode.startsWith("tenth-ruler:")));
        const interpretation = testApi.interpretChart(chart);
        assert("La evidencia muestra regentes de focos y no solo planetas dentro", interpretation.evidence.some((item) => item.includes("Regentes de focos") && item.includes("regente")));

        let yearZeroRejected = false;
        try {
          testApi.calculateChart({ date: "0000-01-01" });
        } catch {
          yearZeroRejected = true;
        }
        assert("El formulario bloquea ano cero y fechas BCE ambiguas", yearZeroRejected);

        const beneficLot = {
          key: "fortune",
          lord: chart.beneficOfSect,
          lon: chart.positions[chart.beneficOfSect].lon,
          house: chart.positions[chart.beneficOfSect].house,
        };
        const beneficLotItems = testApi.lotTestimonyItems(beneficLot, ["jupiter", "venus"], chart, "support");
        assert("El testimonio de lotes conserva rol de benefico de secta y senor directo", beneficLotItems.some((item) => item.key === chart.beneficOfSect && item.lotLord === chart.beneficOfSect && item.isBeneficOfSect && item.roleText));

        const contraryLot = {
          key: "spirit",
          lord: chart.maleficContrarySect,
          lon: chart.positions[chart.maleficContrarySect].lon,
          house: chart.positions[chart.maleficContrarySect].house,
        };
        const contraryLotItems = testApi.lotTestimonyItems(contraryLot, ["mars", "saturn"], chart, "tension");
        assert("El testimonio de lotes conserva rol de malefico contrario y nivel bruto", contraryLotItems.some((item) => item.key === chart.maleficContrarySect && item.lotLord === chart.maleficContrarySect && item.rawLevel && item.level && item.roleText));

        const historicalAudit = testApi.historicalAuditRecords();
        assert("Los ejemplos historicos tienen auditoria normalizada", historicalAudit.length > 0 && historicalAudit.every((item) => item.auditStatus && item.timeConfidence && item.zoneReliability));
        assert("Los ejemplos historicos separan fuente natal y referencia interpretativa", historicalAudit.every((item) => "hasNatalSource" in item && "hasInterpretiveReference" in item));
        assert("La auditoria externa actual cubre todos los personajes historicos", historicalAudit.every((item) => item.auditStatus === "audited" && item.hasNatalSource && item.hasRating && item.externalAuditDate));
        assert("Las fechas fuente con calendario delicado son trazables", historicalAudit.some((item) => item.sourceDateLabel));

        const sectChart = { ...chart, sunAltitude: 0.2 };
        const sectWarnings = testApi.boundaryWarnings(sectChart);
        assert("Sol cerca del horizonte produce aviso de secta", sectWarnings.some((warning) => warning.key === "sect-boundary"));
        assert("Avisos de frontera separan datos logicos de traduccion", sectWarnings.every((warning) => warning.typeCode && Array.isArray(warning.changeCodes) && warning.actionCode && !("changes" in warning) && !("action" in warning)));
        assert("El aviso de secta expone data-code estable", testApi.renderBoundaryAudit(sectWarnings).includes('data-code="sect-boundary"'));
        assert("El render de auditoria de frontera tiene anclaje estable", testApi.renderBoundaryAudit(sectWarnings).includes('data-test="boundary-audit"'));
        assert("El aviso de secta tiene codigos estructurados", sectWarnings.some((warning) => warning.key === "sect-boundary" && warning.changeCodes.includes("fortune-spirit-formulas") && warning.actionCode === "verify-time-coordinates-zone-rectification"));

        const sensitiveSectChart = {
          ...chart,
          sunAltitude: 1.8,
          input: { ...chart.input, timeZone: "", zoneReliability: "manual" },
        };
        assert("Secta entre 1 y 2,5 grados solo es sensible con contexto temporal sensible", testApi.sectSensitivityState(sensitiveSectChart) === "sensitive");
        assert("Contexto IANA exacto no amplia secta fuera de 1 grado", testApi.sectSensitivityState({ ...chart, sunAltitude: 1.8 }) === "stable");
        const alternateSectHtml = testApi.renderAlternateSectLots(sensitiveSectChart);
        assert("Secta sensible muestra roles alternativos de benefico y malefico", alternateSectHtml.includes('data-test="alternate-sect-roles"') && alternateSectHtml.includes("Saturno") && alternateSectHtml.includes("Marte"));

        const fortuneDay = testApi.lotSnapshotForSect("fortune", chart, true);
        const spiritNight = testApi.lotSnapshotForSect("spirit", chart, false);
        assert("Fortuna diurna coincide con Espiritu nocturno al invertir secta", testApi.angleDistance(fortuneDay.lon, spiritNight.lon) < 0.000001);

        const lunarCrossing = testApi.linearLunarAspectCandidates(
          { lon: 359, speed: 13 },
          { lon: 1, speed: 0 },
          1,
          30,
        ).find((candidate) => candidate.type === "conjunction");
        assert("Metodo lunar lineal cruza 0 Aries sin perder conjuncion", lunarCrossing && lunarCrossing.moonTravel < 3);

        const retrogradeLunarContact = testApi.linearLunarAspectCandidates(
          { lon: 10, speed: 13 },
          { lon: 72, speed: -1 },
          1,
          30,
        ).find((candidate) => candidate.type === "sextile");
        assert("Metodo lunar lineal detecta aplicacion a planeta retrogrado", retrogradeLunarContact && retrogradeLunarContact.days > 0 && retrogradeLunarContact.moonTravel < 3);

        const orderedLunarContacts = testApi.linearLunarAspectCandidates(
          { lon: 10, speed: 13 },
          { lon: 75, speed: 0 },
          1,
          90,
        );
        assert("Metodo lunar lineal ordena candidatos por perfeccion futura", orderedLunarContacts.length > 1 && orderedLunarContacts.every((candidate, index, list) => index === 0 || candidate.days >= list[index - 1].days));

        const noRelativeMoonContact = testApi.linearLunarAspectCandidates(
          { lon: 10, speed: 13 },
          { lon: 70, speed: 13 },
          1,
          30,
        );
        assert("Metodo lunar lineal descarta contactos sin velocidad relativa", noRelativeMoonContact.length === 0);

        const afterSignExitContact = testApi.linearLunarAspectCandidates(
          { lon: 29, speed: 13 },
          { lon: 91, speed: 0 },
          1,
          30,
        ).find((candidate) => candidate.type === "sextile");
        assert("Metodo lunar distingue perfeccion tras salir del signo pero dentro de 30 grados", afterSignExitContact && afterSignExitContact.moonTravel > 1 && afterSignExitContact.moonTravel < 30);

        const iterativeContact = testApi.VISIBLE_KEYS
          .filter((key) => key !== "moon" && key !== "sun")
          .flatMap((key) => testApi.lunarAspectCandidates(chart.positions.moon, chart.positions[key], 1, 30, chart, key));
        assert("Metodo lunar iterativo produce contactos refinados cuando hay carta completa", iterativeContact.some((candidate) => candidate.method === "iterative"));
        const linearSaturn = testApi.linearLunarAspectCandidates(chart.positions.moon, chart.positions.saturn, 1, 30)[0];
        const iterativeSaturn = testApi.lunarAspectCandidatesIterative("saturn", 1, 30, chart)[0];
        assert("Busqueda lunar iterativa corrige la estimacion lineal", linearSaturn && iterativeSaturn && Math.abs(linearSaturn.days - iterativeSaturn.days) > 0.01);

        const mcNextChart = { ...chart, angles: { ...chart.angles, mc: 29.7, ic: 209.7 } };
        const mcNext = testApi.boundaryWarnings(mcNextChart).find((warning) => warning.key === "mc-sign-boundary");
        assert("MC cerca de limite siguiente produce aviso propio", mcNext && mcNext.boundarySideCode === "next" && mcNext.currentSign === 0 && mcNext.possibleSign === 1);

        const mcPreviousChart = { ...chart, angles: { ...chart.angles, mc: 0.3, ic: 180.3 } };
        const mcPrevious = testApi.boundaryWarnings(mcPreviousChart).find((warning) => warning.key === "mc-sign-boundary");
        assert("MC cerca de limite anterior produce signo posible anterior", mcPrevious && mcPrevious.boundarySideCode === "previous" && mcPrevious.currentSign === 0 && mcPrevious.possibleSign === 11);

        const icNextChart = { ...chart, angles: { ...chart.angles, mc: 44, ic: 29.7 } };
        const icNext = testApi.boundaryWarnings(icNextChart).find((warning) => warning.key === "ic-sign-boundary");
        assert("IC cerca de limite siguiente produce aviso propio", icNext && icNext.boundarySideCode === "next" && icNext.currentSign === 0 && icNext.possibleSign === 1);

        const icPreviousChart = { ...chart, angles: { ...chart.angles, mc: 44, ic: 0.3 } };
        const icPrevious = testApi.boundaryWarnings(icPreviousChart).find((warning) => warning.key === "ic-sign-boundary");
        assert("IC cerca de limite anterior produce signo posible anterior", icPrevious && icPrevious.boundarySideCode === "previous" && icPrevious.currentSign === 0 && icPrevious.possibleSign === 11);

        const strictChart = testApi.calculateChart({ includeModern: false });
        const modernChart = testApi.calculateChart({ includeModern: true });
        const scoreSignature = (computedChart) => JSON.stringify(testApi.scoreChartTopics(computedChart).map((focus) => ({
          house: focus.house,
          score: Number(focus.score.toFixed(4)),
          items: focus.scoreItems.map((item) => ({
            points: Number(item.points.toFixed(4)),
            category: item.category,
            reasonCode: item.reasonCode,
          })),
        })));
        assert("El score mantiene codigos estables separados de la prosa", testApi.scoreChartTopics(strictChart).every((focus) => focus.scoreItems.every((item) => item.reasonCode && item.reasonCode !== item.reason)));
        assert("Modernos mostrados no alteran el score helenistico base", scoreSignature(strictChart) === scoreSignature(modernChart));
        const modernScoreText = JSON.stringify(testApi.scoreChartTopics(modernChart));
        assert("Score helenistico no contiene Urano", !modernScoreText.includes("uranus"));
        assert("Score helenistico no contiene Neptuno", !modernScoreText.includes("neptune"));
        assert("Score helenistico no contiene Pluton", !modernScoreText.includes("pluto"));
        assert("VISIBLE_KEYS conserva solo planetas visibles clasicos", testApi.VISIBLE_KEYS.every((key) => !["uranus", "neptune", "pluto"].includes(key)));
        assert("Planetas modernos no entran en juicios relacionales", testApi.planetRelationJudgment("sun", "uranus", modernChart, "support") === "");
        assert("Planetas modernos no entran en testimonios de lotes", testApi.lotTestimonyItems(testApi.lotByKey(modernChart, "fortune"), ["uranus", "neptune", "pluto"], modernChart, "support").length === 0);
        assert("Planetas modernos no entran en angularidad visible del juicio", testApi.visibleAngularPlanets(modernChart).every((key) => !["uranus", "neptune", "pluto"].includes(key)));
        const modernInterpretationText = JSON.stringify(testApi.interpretChart(modernChart)).toLowerCase();
        assert("Planetas modernos no entran en la interpretacion helenistica base", !["uranus", "neptune", "pluto", "urano", "neptuno", "pluton", "plutón"].some((key) => modernInterpretationText.includes(key)));
        assert("Las formulas de lotes principales no usan planetas modernos", !["uranus", "neptune", "pluto"].some((key) => (
          testApi.lotFormulaText("fortune", true).toLowerCase().includes(key)
          || testApi.lotFormulaText("spirit", false).toLowerCase().includes(key)
        )));

        assert("La API emite aviso de secta", sectWarnings.some((warning) => warning.key === "sect-boundary"));
      }

      frame.addEventListener("load", () => {
        run()
          .catch((error) => record(error.message || String(error), false))
          .finally(finish);
      }, { once: true });
      frame.src = `../index.html?test=regression&v=${encodeURIComponent(version)}`;
    </script>
  </body>
</html>
